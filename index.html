<!doctype html>
<html lang="he" dir="rtl" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="author" content="Yuval" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!--
      Legacy hash-URL forwarder. Old links in the wild
      (`https://yuval.digital/#/page/privacy`) won't reach the server with
      their hash, so the redirect must happen client-side before React
      mounts. Runs synchronously to avoid a flash of the home route.
    -->
    <script>
      (function () {
        var h = window.location.hash;
        if (!h || h.indexOf('#/') !== 0) return;
        var rest = h.slice(1);
        var hasLang = /^\/(he|en)(\/|$)/.test(rest);
        var dest = hasLang ? rest : '/he' + rest;
        window.location.replace(dest + window.location.search);
      })();
    </script>

    <!--
      Theme bootstrap. Reads the persisted theme and applies it BEFORE
      paint so dark-mode visitors don't see a light flash. Mirrors the
      logic in ThemeProvider.readInitialTheme.
    -->
    <script>
      (function () {
        try {
          var t = window.localStorage.getItem('yuval-digital:theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', t === 'dark' ? '#07090f' : '#ffffff');
          }
        } catch (_) { /* ignore */ }
      })();
    </script>

    <!--
      Per-route <title>, description, canonical, hreflang, OpenGraph,
      Twitter cards and JSON-LD structured data are emitted by
      <Seo /> via react-helmet-async. The static fallback below covers
      the brief moment before hydration on the SPA index, and crawlers
      that fetch the prerendered HTML get the route-specific tags.
    -->
    <title>Yuval Digital — יובל דיגיטל</title>
    <meta
      name="description"
      content="Yuval Digital builds websites, automations and AI-assisted solutions for businesses ready to grow."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Font CSS request:
         - Heebo + Inter only. Rubik/Assistant were CSS fallbacks that never
           render once Heebo is loaded; dropping them saves ~3 @font-face
           blocks and avoids loading their woff2 binaries on slow networks.
         - Weights 300–800 only. Token scale tops out at --fw-black: 800;
           weight 900 was never referenced.
         - rel="preload" + onload-swap kicks the CSS download off in the
           preload scanner pass so font-face declarations land sooner.
         - <noscript> fallback keeps fonts loading when JS is disabled. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
