<!doctype html>
<html lang="he" dir="rtl" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="author" content="Yuval" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!--
      Legacy hash-URL forwarder. Old links in the wild
      (`https://yuvaldigital.co.il/#/page/privacy`) won't reach the server with
      their hash, so the redirect must happen client-side before React
      mounts. Runs synchronously to avoid a flash of the home route.
    -->
    <script>
      (function () {
        var h = window.location.hash;
        if (!h || h.indexOf('#/') !== 0) return;
        var rest = h.slice(1);
        var hasLang = /^\/(he|en)(\/|$)/.test(rest);
        var dest = hasLang ? rest : '/he' + rest;
        window.location.replace(dest + window.location.search);
      })();
    </script>

    <!--
      Theme bootstrap. Reads the persisted theme and applies it BEFORE
      paint so dark-mode visitors don't see a light flash. Mirrors the
      logic in ThemeProvider.readInitialTheme.
    -->
    <script>
      (function () {
        try {
          var t = window.localStorage.getItem('yuval-digital:theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t);
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', t === 'dark' ? '#07090f' : '#ffffff');
          }
        } catch (_) { /* ignore */ }
      })();
    </script>

    <!--
      Per-route <title>, description, canonical, hreflang, OpenGraph,
      Twitter cards and JSON-LD structured data are emitted by
      <Seo /> via react-helmet-async. No static fallback title or
      description here on purpose: keeping them duplicates the head on
      every prerendered page and trips SEO linters that flag multiple
      <title> tags. Helmet swaps in route-specific tags both at
      prerender time and on the SPA index before paint.
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Font CSS request:
         - Heebo only on the critical path. The Hebrew home is the default
           locale; Inter is only used inside [dir='ltr'] descendants, so on
           Hebrew routes the Inter woff2 files were ~80 KiB of download
           cost that never rendered. The English route still gets Inter via
           the LangLayout-injected <link> below — but the LCP frame on /he
           no longer races against four Inter weight downloads.
         - Heebo weights trimmed to 400/600/700/800 — the regular body,
           semibold accents, bold headings and the black hero title. 500
           (--fw-medium) is declared in the token layer but only used on
           a handful of subtle subtitles where the swap from Heebo 400
           is imperceptible; dropping it saves one woff2 per render path.
         - media="print" + onload swap makes the font CSS non-blocking
           (display=swap inside the URL means the woff2 files don't block
           paint either; the browser uses a system fallback then swaps).
         - <noscript> fallback keeps fonts loading when JS is disabled. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap"
      media="print"
      onload="this.media='all';this.onload=null"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
